<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Loading...</title>

  <link rel="stylesheet" href="css/style.css">

  <style>

    body{
      font-family:Poppins,sans-serif;
      background:#f5f5f5;
      margin:0;
      padding:0;
    }

    .post-container{
      max-width:1100px;
      margin:40px auto;
      background:#fff;
      padding:30px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .post-title{
      font-size:32px;
      font-weight:700;
      margin-bottom:20px;
      color:#111;
      line-height:1.4;
    }

    .post-content{
      font-size:18px;
      line-height:1.9;
      color:#222;
    }

    .post-content h2{
      background:#d40000;
      color:#fff;
      padding:10px;
      border-radius:5px;
      font-size:22px;
      margin-top:30px;
    }

    .post-content ul{
      padding-left:20px;
    }

    .post-content li{
      margin-bottom:10px;
    }

  </style>

</head>

<body>

  <div class="post-container">

    <div class="post-title" id="post-title">
      Loading...
    </div>

    <div class="post-content" id="post-content">

    </div>

  </div>

  <script type="module" src="post.js"></script>

</body>
</html>
